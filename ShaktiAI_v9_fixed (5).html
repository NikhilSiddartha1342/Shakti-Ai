<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>ShaktiAI — Empowering Rural Women</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        min-width: 0;
      }
      img, video, iframe, canvas {
        max-width: 100%;
      }
      :root {
        --s: #e8631a;
        --sl: #fff3ea;
        --sm: #f5a96b;
        --sd: #c14b1f;
        --g: #1b6b45;
        --gl: #e6f5ee;
        --gm: #3db578;
        --i: #1e2140;
        --il: #ecedf8;
        --im: #6b7280;
        --gold: #d4a017;
        --goldl: #fdf6e0;
        --ruby: #c0392b;
        --rubyl: #fdecea;
        --cream: #fefaf4;
        --chalk: #f7f4ee;
        --border: rgba(30, 33, 64, 0.1);
        --border2: rgba(30, 33, 64, 0.18);
        --r: 14px;
        --rs: 8px;
        --sh: 0 2px 16px rgba(30, 33, 64, 0.08);
      }
      body {
        font-family: "Poppins", sans-serif;
        background: var(--cream);
        color: var(--i);
        overflow-x: hidden;
        overflow-y: hidden;
        height: 100vh;
      }
      /* Mobile body override handled in @media block */
      .lang-te {
        font-family: "Noto Sans Telugu", sans-serif;
      }
      .lang-hi {
        font-family: "Noto Sans Devanagari", sans-serif;
      }
      .app {
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      .sb {
        width: 222px;
        min-width: 222px;
        background: var(--i);
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }
      .sb::after {
        content: "";
        position: absolute;
        bottom: -60px;
        right: -60px;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: rgba(232, 99, 26, 0.07);
        pointer-events: none;
      }
      .sb-logo {
        padding: 16px 18px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      }
      .sb-brand {
        font-family: "Noto Sans Devanagari", sans-serif;
        font-size: 22px;
        color: var(--s);
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .sb-tag {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.32);
        margin-top: 2px;
        letter-spacing: 0.5px;
      }
      .sb-nav {
        flex: 1;
        padding: 8px 0;
        overflow-y: auto;
      }
      .sb-nav::-webkit-scrollbar {
        display: none;
      }
      .sb-sec {
        padding: 10px 18px 4px;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.22);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 600;
      }
      .ni {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 9px 18px;
        cursor: pointer;
        transition: all 0.15s;
        font-size: 12.5px;
        color: rgba(255, 255, 255, 0.52);
        font-weight: 500;
        border-left: 3px solid transparent;
      }
      .ni:hover {
        background: rgba(255, 255, 255, 0.05);
        color: rgba(255, 255, 255, 0.82);
      }
      .ni.active {
        background: rgba(232, 99, 26, 0.14);
        color: var(--s);
        border-left-color: var(--s);
      }
      .ni-badge {
        margin-left: auto;
        background: var(--s);
        color: #fff;
        font-size: 9px;
        padding: 1px 6px;
        border-radius: 8px;
        font-weight: 700;
      }
      .ni-new {
        margin-left: auto;
        background: var(--gm);
        color: #fff;
        font-size: 8px;
        padding: 1px 5px;
        border-radius: 6px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      .sb-foot {
        padding: 12px 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
      }
      .sb-user {
        display: flex;
        align-items: center;
        gap: 9px;
        margin-bottom: 8px;
      }
      .sb-pts {
        display: flex;
        justify-content: space-between;
        padding: 7px 10px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 8px;
      }
      .ava {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: var(--s);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 13px;
        color: #fff;
        flex-shrink: 0;
      }
      .main {
        overflow-x: hidden;
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 11px 22px;
        background: #fff;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        z-index: 10;
        flex-wrap: wrap;
        gap: 8px;
      }
      .tb-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--i);
      }
      .tb-r {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
        flex-wrap: nowrap;
      }
      .lang-wrap {
        display: flex;
        gap: 2px;
        background: var(--il);
        border-radius: 20px;
        padding: 3px;
      }
      .lo {
        padding: 3px 10px;
        border-radius: 16px;
        font-size: 11px;
        cursor: pointer;
        font-weight: 600;
        color: var(--im);
        transition: all 0.15s;
      }
      .lo.active {
        background: var(--s);
        color: #fff;
      }
      .nbell {
        position: relative;
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--sl);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 14px;
      }
      .ndot {
        position: absolute;
        top: 5px;
        right: 5px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--sd);
        border: 2px solid #fff;
      }
      .content {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 18px 22px;
        box-sizing: border-box;
        max-width: 100%;
      }
      .card {
        background: #fff;
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 18px;
        box-shadow: var(--sh);
        box-sizing: border-box;
        max-width: 100%;
        overflow-x: hidden;
      }
      .card-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--i);
        margin-bottom: 3px;
      }
      .card-sub {
        font-size: 11px;
        color: var(--im);
      }
      .card-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .g2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .g3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .g4 {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      .stat {
        background: var(--chalk);
        border-radius: 10px;
        padding: 14px;
        border: 1px solid var(--border);
      }
      .stat-val {
        font-size: 22px;
        font-weight: 800;
        color: var(--sd);
      }
      .stat-label {
        font-size: 10px;
        color: var(--im);
        margin-top: 3px;
        font-weight: 500;
      }
      .stat-delta {
        font-size: 10px;
        color: var(--gm);
        font-weight: 600;
        margin-top: 4px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all 0.15s;
        font-family: "Poppins", sans-serif;
        white-space: nowrap;
        flex-shrink: 0;
        max-width: 100%;
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .bp {
        background: var(--s);
        color: #fff;
      }
      .bp:hover:not(:disabled) {
        background: var(--sd);
      }
      .bo {
        background: transparent;
        color: var(--s);
        border: 1.5px solid var(--s);
      }
      .bo:hover:not(:disabled) {
        background: var(--sl);
      }
      .bg {
        background: var(--g);
        color: #fff;
      }
      .bg:hover:not(:disabled) {
        background: #0f4a30;
      }
      .bsm {
        padding: 5px 10px;
        font-size: 11px;
      }
      .btn-full {
        width: 100%;
        justify-content: center;
      }
      .fg {
        margin-bottom: 13px;
      }
      .fl {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--i);
        margin-bottom: 5px;
      }
      .fi {
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
        padding: 9px 12px;
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-size: 12px;
        font-family: "Poppins", sans-serif;
        color: var(--i);
        background: var(--chalk);
        outline: none;
        transition: border 0.15s;
      }
      .fi:focus {
        border-color: var(--s);
        background: #fff;
      }
      .auth-bg {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          #1e2140 0%,
          #1b6b45 60%,
          #e8631a 100%
        );
        position: relative;
        overflow-x: hidden;
        overflow-y: auto;
        padding: 20px;
      }
      .auth-ring {
        position: absolute;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 50%;
        pointer-events: none;
      }
      .auth-card {
        background: #fff;
        border-radius: 20px;
        padding: 36px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
        position: relative;
        z-index: 2;
        box-sizing: border-box;
      }
      .tabs {
        display: flex;
        gap: 3px;
        background: var(--chalk);
        border-radius: 8px;
        padding: 3px;
        border: 1px solid var(--border);
        margin-bottom: 16px;
      }
      .tab {
        flex: 1;
        padding: 7px;
        text-align: center;
        font-size: 11px;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        color: var(--im);
        transition: all 0.15s;
      }
      .tab.active {
        background: var(--s);
        color: #fff;
      }
      .wbanner {
        background: linear-gradient(135deg, #1e2140 0%, #1b6b45 100%);
        border-radius: 14px;
        padding: 20px 24px;
        color: #fff;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: relative;
        overflow: hidden;
      }
      .wbanner::before {
        content: "";
        position: absolute;
        right: -25px;
        top: -25px;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.05);
      }
      .wbanner::after {
        content: "";
        position: absolute;
        right: 60px;
        bottom: -40px;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.04);
      }
      .sc-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .bg-green {
        background: var(--gl);
        color: var(--g);
      }
      .bg-gold {
        background: var(--goldl);
        color: var(--gold);
      }
      .bg-saffron {
        background: var(--sl);
        color: var(--sd);
      }
      .bg-teal {
        background: #e0f4f4;
        color: #0d7377;
      }
      .chat-wrap {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 122px);
      }
      .chat-msgs {
        flex: 1;
        overflow-y: auto;
        padding: 10px 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .msg {
        display: flex;
        gap: 9px;
        align-items: flex-start;
        animation: msgIn 0.22s ease;
      }
      @keyframes msgIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg-u {
        flex-direction: row-reverse;
      }
      .mava {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
      }
      .mava-ai {
        background: var(--s);
        color: #fff;
      }
      .mava-u {
        background: var(--g);
        color: #fff;
      }
      .mbub {
        max-width: 72%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 12.5px;
        line-height: 1.65;
      }
      .mbub-ai {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 3px 14px 14px 14px;
        color: var(--i);
        white-space: pre-wrap;
      }
      .mbub-u {
        background: var(--s);
        color: #fff;
        border-radius: 14px 3px 14px 14px;
      }
      .chat-in {
        display: flex;
        gap: 9px;
        align-items: flex-end;
        padding-top: 12px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .chat-ta {
        flex: 1;
        padding: 10px 14px;
        border: 1.5px solid var(--border);
        border-radius: 14px;
        font-size: 12.5px;
        font-family: "Poppins", sans-serif;
        resize: none;
        min-height: 42px;
        max-height: 100px;
        color: var(--i);
        background: var(--chalk);
        outline: none;
        transition: border 0.15s;
      }
      .chat-ta:focus {
        border-color: var(--s);
        background: #fff;
      }
      .mic-btn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: var(--gl);
        border: none;
        cursor: pointer;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
      }
      .mic-btn.on {
        background: #ffecec;
        animation: mic-pulse 1.2s infinite;
      }
      @keyframes mic-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.4);
        }
        50% {
          box-shadow: 0 0 0 8px rgba(192, 57, 43, 0);
        }
      }
      .pb {
        background: rgba(30, 33, 64, 0.08);
        border-radius: 20px;
        overflow: hidden;
        height: 7px;
      }
      .pbf {
        height: 100%;
        border-radius: 20px;
        background: var(--s);
        transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .pbg {
        background: var(--gm);
      }
      .mc {
        background: #fff;
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .mc:hover {
        border-color: var(--s);
        box-shadow: var(--sh);
      }
      .mc.done {
        border-color: var(--gm);
        background: var(--gl);
      }
      .mc-ico {
        width: 38px;
        height: 38px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }
      .typing {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--sm);
        animation: bonce 1.2s infinite;
      }
      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes bonce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-5px);
        }
      }
      .badge-card {
        background: #fff;
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 16px;
        text-align: center;
        transition: all 0.2s;
      }
      .badge-card.earned {
        border-color: var(--gold);
        background: linear-gradient(135deg, #fffdf5, #fff8e0);
      }
      .badge-card.earned::after {
        content: "✓";
        position: absolute;
        top: 8px;
        right: 10px;
        font-size: 12px;
        font-weight: 700;
        color: var(--gold);
      }
      .badge-card {
        position: relative;
      }
      .at {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      .at th {
        text-align: left;
        padding: 8px 12px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--im);
        border-bottom: 1px solid var(--border);
        font-weight: 600;
      }
      .at td {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        color: var(--i);
      }
      .at tr:hover td {
        background: var(--chalk);
      }
      .cli {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 8px 0;
        border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        cursor: pointer;
      }
      .chk {
        width: 18px;
        height: 18px;
        border: 2px solid var(--border2);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.15s;
        font-size: 10px;
        color: #fff;
      }
      .chk.on {
        background: var(--g);
        border-color: var(--g);
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--i);
        color: #fff;
        padding: 10px 18px;
        border-radius: 10px;
        font-size: 12px;
        z-index: 9999;
        animation: toastIn 0.3s ease;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        max-width: 300px;
        font-weight: 500;
      }
      @keyframes toastIn {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .notif-panel {
        position: absolute;
        top: 38px;
        right: 0;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 14px;
        width: 290px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        z-index: 200;
        overflow: hidden;
      }
      .pr {
        background: var(--sl);
        border: 1.5px solid var(--sm);
        border-radius: 14px;
        padding: 18px;
        margin-top: 14px;
      }
      .hashtag {
        display: inline-block;
        background: var(--sd);
        color: #fff;
        padding: 2px 7px;
        border-radius: 20px;
        font-size: 10px;
        margin: 2px;
      }
      .alert {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        margin-bottom: 14px;
      }
      .alert-info {
        background: var(--il);
        color: var(--i);
        border: 1px solid rgba(30, 33, 64, 0.15);
      }
      .alert-success {
        background: var(--gl);
        color: var(--g);
        border: 1px solid rgba(27, 107, 69, 0.2);
      }
      .div {
        height: 1px;
        background: var(--border);
        margin: 14px 0;
      }
      .plan-content {
        font-size: 13px;
        line-height: 1.8;
        color: var(--i);
        background: var(--chalk);
        padding: 12px 16px;
        border-radius: 8px;
        border: 1px solid var(--border);
        white-space: pre-wrap;
        margin-bottom: 14px;
      }
      .emi-result {
        background: linear-gradient(135deg, var(--i), #2e3260);
        border-radius: 14px;
        padding: 20px;
        color: #fff;
        margin-top: 14px;
      }
      .tx-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 9px 0;
        border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      }
      .post-card {
        background: #fff;
        border-radius: 14px;
        border: 1px solid var(--border);
        padding: 16px;
        margin-bottom: 12px;
      }
      .post-ava {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--s);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
        color: #fff;
        flex-shrink: 0;
      }
      .post-like {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 10px;
        border-radius: 20px;
        background: var(--chalk);
        border: 1px solid var(--border);
        font-size: 11px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.15s;
      }
      .post-like:hover {
        background: var(--sl);
        border-color: var(--s);
        color: var(--sd);
      }
      .inv-card {
        background: #fff;
        border: 2px solid var(--border2);
        border-radius: 14px;
        padding: 24px;
        font-size: 12px;
        overflow-x: auto;
        box-sizing: border-box;
      }
      .inv-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 20px;
        padding-bottom: 14px;
        border-bottom: 2px solid var(--border);
      }
      #inv-print-area {
        display: none;
      }
      @media print {
        body > * {
          display: none !important;
        }
        #inv-print-area {
          display: block !important;
          position: fixed !important;
          top: 0;
          left: 0;
          width: 100%;
          background: #fff;
          padding: 30px;
          z-index: 99999;
        }
        #root {
          display: none !important;
        }
      }
      /* CONFETTI */
      .confetti-piece {
        position: fixed;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        animation: confettiFall linear forwards;
        pointer-events: none;
        z-index: 9998;
      }
      @keyframes confettiFall {
        0% {
          transform: translateY(-20px) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(100vh) rotate(720deg);
          opacity: 0;
        }
      }
      /* MASCOT */
      .mascot {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 500;
        cursor: pointer;
      }
      .mascot-bubble {
        position: absolute;
        bottom: 70px;
        right: 0;
        background: #fff;
        border: 1.5px solid var(--border);
        border-radius: 14px;
        border-bottom-right-radius: 4px;
        padding: 12px 16px;
        width: 240px;
        box-shadow: var(--sh);
        font-size: 12px;
        line-height: 1.6;
        color: var(--i);
        animation: popIn 0.2s ease;
      }
      @keyframes popIn {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .mascot-btn {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--s), var(--sd));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        box-shadow: 0 4px 16px rgba(232, 99, 26, 0.4);
        transition: transform 0.2s;
      }
      .mascot-btn:hover {
        transform: scale(1.1);
      }
      /* HEALTH SCORE */
      .health-ring {
        width: 110px;
        height: 110px;
        position: relative;
        flex-shrink: 0;
      }
      .health-ring svg {
        transform: rotate(-90deg);
      }
      .health-score {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-weight: 800;
      }
      /* FESTIVAL CARD */
      .fest-card {
        background: linear-gradient(135deg, #fff8e0, #fff0d0);
        border: 1px solid var(--gold);
        border-radius: 12px;
        padding: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      /* QR */
      .qr-grid {
        display: grid;
        grid-template-columns: repeat(21, minmax(24px, 1fr));
        overflow-x: auto;
        gap: 1px;
        width: 126px;
        height: 126px;
        padding: 8px;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .qr-cell {
        border-radius: 1px;
      }
      /* VOICE MODE */
      .voice-mode {
        position: fixed;
        inset: 0;
        background: rgba(30, 33, 64, 0.95);
        z-index: 800;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
      }
      .voice-waves {
        display: flex;
        align-items: center;
        gap: 5px;
        height: 60px;
        margin: 24px 0;
      }
      .vw {
        width: 6px;
        border-radius: 3px;
        background: var(--s);
        animation: vwave 1s ease-in-out infinite;
      }
      .vw:nth-child(1) {
        animation-delay: 0s;
        height: 16px;
      }
      .vw:nth-child(2) {
        animation-delay: 0.1s;
        height: 32px;
      }
      .vw:nth-child(3) {
        animation-delay: 0.2s;
        height: 48px;
      }
      .vw:nth-child(4) {
        animation-delay: 0.3s;
        height: 60px;
      }
      .vw:nth-child(5) {
        animation-delay: 0.4s;
        height: 48px;
      }
      .vw:nth-child(6) {
        animation-delay: 0.3s;
        height: 32px;
      }
      .vw:nth-child(7) {
        animation-delay: 0.2s;
        height: 16px;
      }
      @keyframes vwave {
        0%,
        100% {
          transform: scaleY(0.4);
        }
        50% {
          transform: scaleY(1);
        }
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 4px;
      }
      /* ══════════ NEW MODULE STYLES ══════════ */
      .timeline {
        position: relative;
        padding-left: 28px;
      }
      .timeline::before {
        content: "";
        position: absolute;
        left: 10px;
        top: 8px;
        bottom: 8px;
        width: 2px;
        background: var(--border2);
      }
      .tl-item {
        position: relative;
        margin-bottom: 18px;
      }
      .tl-dot {
        position: absolute;
        left: -23px;
        top: 4px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 3px solid var(--border2);
        background: #fff;
        transition: all 0.2s;
        z-index: 1;
      }
      .tl-dot.done {
        background: var(--gm);
        border-color: var(--gm);
      }
      .tl-dot.active {
        background: var(--s);
        border-color: var(--s);
        box-shadow: 0 0 0 4px var(--sl);
      }
      .tl-dot.pending {
        background: #fff;
        border-color: var(--border2);
      }
      .tl-content {
        background: #fff;
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 12px 14px;
        font-size: 12px;
      }
      .tl-title {
        font-weight: 700;
        font-size: 12.5px;
        margin-bottom: 3px;
      }
      .tl-sub {
        font-size: 10px;
        color: var(--im);
      }
      .elig-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 700;
      }
      .elig-eligible {
        background: #e6f5ee;
        color: #1b6b45;
        border: 1.5px solid #3db578;
      }
      .elig-partial {
        background: #fff8e0;
        color: #d4a017;
        border: 1.5px solid #d4a017;
      }
      .elig-not {
        background: #fdecea;
        color: #c0392b;
        border: 1.5px solid #c0392b;
      }
      .prob-ring {
        position: relative;
        width: 130px;
        height: 130px;
        flex-shrink: 0;
      }
      .prob-ring svg {
        transform: rotate(-90deg);
      }
      .prob-score {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .doc-card {
        background: #fff;
        border: 1.5px dashed var(--border2);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
      }
      .doc-card.uploaded {
        border-style: solid;
        border-color: var(--gm);
        background: var(--gl);
      }
      .doc-card:hover {
        border-color: var(--s);
        background: var(--sl);
      }
      .doc-card input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }
      .rm-node {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        position: relative;
        text-align: center;
        transition: all 0.2s;
        cursor: default;
      }
      .rm-node:hover {
        border-color: var(--s);
        box-shadow: var(--sh);
      }
      .rm-connector {
        width: 2px;
        height: 24px;
        background: var(--border2);
        margin: 0 auto;
      }
      .fam-card {
        background: #fff;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        transition: all 0.2s;
        cursor: pointer;
      }
      .fam-card:hover {
        border-color: var(--s);
      }
      .fam-card.selected {
        border-color: var(--s);
        background: var(--sl);
      }
      .heatmap-cell {
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s;
        position: relative;
      }
      .heatmap-cell:hover {
        opacity: 0.85;
        transform: scale(1.05);
      }
      .offline-badge {
        position: fixed;
        top: 12px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ruby);
        color: #fff;
        padding: 6px 18px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .wa-btn {
        background: #25d366;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 9px 16px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-family: "Poppins", sans-serif;
        transition: all 0.15s;
      }
      .wa-btn:hover {
        background: #1ebe57;
      }
      .impact-ring {
        width: 90px;
        height: 90px;
        position: relative;
        flex-shrink: 0;
      }
      .impact-ring svg {
        transform: rotate(-90deg);
      }
      .impact-score {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 800;
      }
      .voice-nav-card {
        background: linear-gradient(135deg, #1e2140, #2a3a6e);
        border-radius: 14px;
        padding: 22px;
        color: #fff;
        margin-bottom: 16px;
        width: 100%;
        box-sizing: border-box;
        overflow: hidden;
      }
      .voice-result {
        background: #fff;
        border-radius: 12px;
        border: 1px solid var(--border);
        padding: 16px;
        margin-bottom: 10px;
        display: flex;
        gap: 12px;
        align-items: flex-start;
        cursor: pointer;
        transition: all 0.15s;
      }
      .voice-result:hover {
        border-color: var(--s);
        box-shadow: var(--sh);
      }
      .progress-step {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 8px;
        background: var(--chalk);
        border: 1px solid var(--border);
        margin-bottom: 8px;
      }
      .step-num {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .loc-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: var(--chalk);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 12px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
      .loc-chip.active {
        background: var(--s);
        color: #fff;
        border-color: var(--s);
      }
      .bundle-card {
        background: linear-gradient(135deg, var(--i), #2e3260);
        border-radius: 12px;
        padding: 16px;
        color: #fff;
        margin-bottom: 10px;
      }

      /* ═══════════════════════════════════
         MOBILE SIDEBAR DRAWER
      ═══════════════════════════════════ */
      .mob-fab {
        display: none;
        position: fixed;
        bottom: 24px;
        left: 20px;
        z-index: 900;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: var(--i);
        border: none;
        cursor: pointer;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(30,33,64,0.45);
        transition: transform 0.2s, background 0.2s;
        flex-direction: column;
        gap: 5px;
        padding: 0;
      }
      .mob-fab:hover { transform: scale(1.08); }
      .mob-fab.open { background: var(--sd); }
      .mob-fab span {
        display: block;
        width: 20px;
        height: 2px;
        background: #fff;
        border-radius: 2px;
        transition: all 0.25s;
        transform-origin: center;
      }
      .mob-fab.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
      .mob-fab.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
      .mob-fab.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

      .mob-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(10,12,30,0.55);
        z-index: 850;
        animation: fadeInOverlay 0.2s ease;
      }
      @keyframes fadeInOverlay {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .mob-overlay.visible { display: block; }

      .mob-drawer {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: 260px;
        background: var(--i);
        z-index: 860;
        display: flex;
        flex-direction: column;
        transform: translateX(-100%);
        transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
        box-shadow: 4px 0 32px rgba(0,0,0,0.35);
        overflow-y: auto;
      }
      .mob-drawer.open { transform: translateX(0); }
      .mob-drawer::-webkit-scrollbar { display: none; }

      /* ── Active page pill inside drawer ── */
      .mob-drawer .ni.active {
        background: rgba(232,99,26,0.18);
        color: var(--s);
        border-left-color: var(--s);
      }

      /* ═══════════════════════════════════
         RESPONSIVE LAYOUT
      ═══════════════════════════════════ */
      /* ═══════════════════════════════════
         RESPONSIVE — TABLET 900px
      ═══════════════════════════════════ */
      @media (max-width: 900px) {
        .g4 { grid-template-columns: repeat(2, 1fr); }
        .g3 { grid-template-columns: repeat(2, 1fr); }
        .sb { width: 190px; min-width: 190px; }
        .sb-brand { font-size: 18px; }
        .ni { font-size: 11.5px; padding: 8px 14px; }
      }

      /* ═══════════════════════════════════
         RESPONSIVE — MOBILE 768px
      ═══════════════════════════════════ */
      @media (max-width: 768px) {
        /* ── Body & App shell ── */
        body { overflow-x: hidden; overflow-y: auto; height: auto; min-height: 100vh; }
        .app { height: auto; min-height: 100vh; overflow: visible; flex-direction: column; }

        /* ── Sidebar: hide desktop, show FAB ── */
        .sb { display: none !important; }
        .mob-fab { display: flex; }

        /* ── Main content area ── */
        .main { width: 100vw; max-width: 100vw; min-width: 0; overflow: visible; height: auto; min-height: 100vh; }
        .content { padding: 12px; padding-bottom: 96px; overflow: visible; height: auto; box-sizing: border-box; }

        /* ── Topbar ── */
        .topbar { padding: 10px 12px; gap: 8px; flex-wrap: wrap; }
        .tb-title { font-size: 13px; }
        .tb-r { gap: 6px; }
        .lang-wrap { gap: 2px; }
        .lo { padding: 4px 7px; font-size: 10px; }
        .nbell { font-size: 15px; }
        .notif-panel { right: -60px; width: 280px; }

        /* ── Grids ── */
        .g4, .g3, .g2 { grid-template-columns: 1fr !important; }

        /* ── Cards ── */
        .card { padding: 14px; }
        .card-title { font-size: 13px; }

        /* ── Auth ── */
        .auth-wrap { padding: 16px; align-items: flex-start; padding-top: 40px; }
        .auth-card { padding: 22px 16px; width: 100%; max-width: 100%; }

        /* ── Chat / Mentor ── */
        .mbub { max-width: 90%; font-size: 12px; }
        .chat-wrap { height: calc(100svh - 130px); }
        .chat-input-row { flex-wrap: wrap; gap: 6px; }

        /* ── Stats ── */
        .stat-val { font-size: 18px; }
        .stat-label { font-size: 10px; }

        /* ── Progress bar ── */
        .pb { height: 7px; }

        /* ── Module cards (Learning) ── */
        .mc { padding: 12px; gap: 10px; }
        .mc-ico { width: 38px; height: 38px; font-size: 18px; }

        /* ── Voice navigator ── */
        .voice-nav-card { padding: 20px 14px; }
        .voice-result { padding: 10px 12px; }

        /* ── EMI / Finance ── */
        .emi-result { padding: 14px; }
        .emi-result .g2 { grid-template-columns: 1fr !important; }

        /* ── Invoice ── */
        .inv-card { padding: 14px; }
        .inv-head { flex-direction: column; gap: 8px; }
        .inv-list-item { flex-wrap: wrap; gap: 8px; }

        /* ── Schemes page ── */
        .scheme-card { padding: 14px; }

        /* ── Mascot ── */
        .mascot { bottom: 90px; right: 14px; }
        .mascot-body { width: 52px; height: 52px; font-size: 24px; }

        /* ── Toast / badges ── */
        .toast { left: 50%; transform: translateX(-50%) translateY(0); bottom: 80px; right: auto; width: 90vw; text-align: center; font-size: 12px; }
        .offline-badge { font-size: 11px; padding: 7px 14px; left: 50%; transform: translateX(-50%); right: auto; }
        .ghost-badge { font-size: 10px; }

        /* ── Buttons ── */
        .btn { padding: 7px 11px; font-size: 11px; }
        .btn-row { flex-wrap: wrap; gap: 6px; }

        /* ── Forms ── */
        .fi { font-size: 13px; padding: 9px 12px; }
        .fl { font-size: 11px; }

        /* ── Dashboard quick actions ── */
        .qa-grid { grid-template-columns: repeat(2,1fr) !important; }

        /* ── Heatmap / Map grid ── */
        .hm-grid { grid-template-columns: 1fr !important; }

        /* ── Opportunity heatmap calendar ── */
        .opp-cal { overflow-x: auto; }

        /* ── Achievements grid ── */
        .ach-grid { grid-template-columns: repeat(2,1fr) !important; }

        /* ── Community cards ── */
        .comm-card { padding: 14px; }

        /* ── Admin charts: stack ── */
        .admin-charts { grid-template-columns: 1fr !important; }

        /* ── IVR demo ── */
        .ivr-wrap { padding: 16px; }

        /* ── Mob logo chip ── */
        .mob-logo-chip { display: block; }
      }

      /* ═══════════════════════════════════
         RESPONSIVE — SMALL PHONES 480px
      ═══════════════════════════════════ */
      @media (max-width: 480px) {
        .topbar { padding: 8px 10px; }
        .lang-wrap { scale: 0.88; transform-origin: right center; }
        .tb-title { font-size: 12px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card { padding: 12px; }
        .card-title { font-size: 12px; }
        .auth-card { padding: 18px 13px; }
        .mc { padding: 10px; gap: 8px; }
        .mc-ico { width: 34px; height: 34px; font-size: 16px; }
        .stat-val { font-size: 16px; }
        .voice-nav-card { padding: 16px 12px; border-radius: 16px; }
        .fi { font-size: 12px; }
        .pin-pad { width: 240px; gap: 10px; }
        .pin-key { height: 60px; border-radius: 14px; }
        .pin-key-num { font-size: 19px; }
        .notif-panel { right: -80px; width: 260px; }
        .ghost-setup-hero { padding: 16px; }
        .toast { width: 94vw; }
      }

      /* ═══════════════════════════════════
         RESPONSIVE — TINY PHONES 360px
      ═══════════════════════════════════ */
      @media (max-width: 360px) {
        .topbar { padding: 7px 8px; }
        .tb-title { max-width: 90px; }
        .lang-wrap { scale: 0.8; }
        .card { padding: 10px; }
        .mc { padding: 8px; gap: 7px; }
        .btn { padding: 6px 9px; font-size: 10.5px; }
        .fi { font-size: 11px; padding: 8px 10px; }
      }
      /* ── Invoice list item ── */
      .inv-list-item {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: all 0.15s;
      }
      .inv-list-item:hover, .inv-list-item.sel {
        border-color: var(--s);
        box-shadow: var(--sh);
      }
      .inv-status {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 20px;
      }
      .inv-paid   { background: var(--gl); color: var(--g); }
      .inv-unpaid { background: var(--goldl); color: var(--gold); }

      /* ── Mobile topbar logo chip ── */
      .mob-logo-chip {
        display: none;
        font-family: "Noto Sans Devanagari", sans-serif;

      /* ═══════════════════════════════════════
         GHOST BALANCE / SAFETY VAULT STYLES
         ═══════════════════════════════════════ */

      /* PIN Gate Screen */
      .pin-gate {
        position: fixed; inset: 0;
        background: linear-gradient(160deg, #0f1020 0%, #1a1a2e 50%, #0d1f14 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9000; color: #fff;
        font-family: "Poppins", sans-serif;
      }
      .pin-gate-logo {
        font-family: "Noto Sans Devanagari", sans-serif;
        font-size: 38px; font-weight: 800; color: #e8631a;
        line-height: 1; margin-bottom: 6px;
      }
      .pin-gate-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 40px; letter-spacing: 0.5px; }
      .pin-dots {
        display: flex; gap: 16px; margin-bottom: 40px;
      }
      .pin-dot {
        width: 16px; height: 16px; border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.3);
        background: transparent;
        transition: all 0.15s;
      }
      .pin-dot.filled {
        background: #e8631a; border-color: #e8631a;
        box-shadow: 0 0 10px rgba(232,99,26,0.6);
      }
      .pin-dot.error {
        background: #c0392b; border-color: #c0392b;
        animation: pinShake 0.4s ease;
      }
      @keyframes pinShake {
        0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)}
      }
      .pin-pad {
        display: grid; grid-template-columns: repeat(3, 1fr);
        gap: 14px; width: 260px;
      }
      .pin-key {
        height: 68px; border-radius: 16px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(255,255,255,0.1);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        cursor: pointer; user-select: none;
        transition: all 0.12s;
        -webkit-tap-highlight-color: transparent;
      }
      .pin-key:active, .pin-key.pressed {
        background: rgba(232,99,26,0.25);
        border-color: rgba(232,99,26,0.5);
        transform: scale(0.93);
      }
      .pin-key-num { font-size: 22px; font-weight: 600; color: #fff; line-height: 1; }
      .pin-key-letters { font-size: 8px; color: rgba(255,255,255,0.3); letter-spacing: 1.5px; margin-top: 2px; }
      .pin-key.del { background: rgba(255,255,255,0.04); }
      .pin-error-msg {
        margin-top: 24px; font-size: 12px;
        color: #e8631a; font-weight: 600;
        height: 18px; text-align: center;
      }
      .pin-hint {
        margin-top: 12px; font-size: 10px;
        color: rgba(255,255,255,0.2);
        text-align: center; line-height: 1.6;
      }
      .pin-skip-btn {
        margin-top: 20px; font-size: 11px;
        color: rgba(255,255,255,0.28); cursor: pointer;
        text-decoration: underline; background: none;
        border: none; font-family: inherit;
        padding: 8px 16px;
      }

      /* Ghost mode silent indicator — hidden in plain sight */
      .ghost-badge {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 3px 10px; border-radius: 20px;
        font-size: 10px; font-weight: 700;
        background: rgba(192,57,43,0.1); color: #c0392b;
        border: 1px solid rgba(192,57,43,0.2);
        position: fixed; bottom: 8px; left: 50%;
        transform: translateX(-50%);
        z-index: 8000;
      }
      /* In ghost mode — faint watermark on balance areas only visible to her */
      .ghost-watermark {
        font-size: 9px; color: rgba(192,57,43,0.5);
        font-weight: 700; letter-spacing: 0.8px;
        text-transform: uppercase;
      }

      /* Ghost Balance Setup Page */
      .ghost-setup-hero {
        background: linear-gradient(135deg, #1e2140 0%, #2d1010 100%);
        border-radius: 16px; padding: 22px; margin-bottom: 18px; color: #fff;
        position: relative; overflow: hidden;
      }
      .ghost-setup-hero::before {
        content: "🛡️"; position: absolute; right: 20px; top: 50%;
        transform: translateY(-50%); font-size: 64px; opacity: 0.12;
      }
      .ghost-setup-hero h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
      .ghost-setup-hero p { font-size: 12px; opacity: 0.65; line-height: 1.7; }
      .ghost-pin-field {
        display: flex; gap: 8px; align-items: center;
      }
      .ghost-pin-input {
        flex: 1; padding: 10px 14px;
        border: 2px solid var(--border);
        border-radius: 10px; font-size: 18px;
        font-family: monospace; letter-spacing: 6px;
        background: var(--chalk); color: var(--i);
        outline: none; transition: border 0.15s;
        text-align: center;
      }
      .ghost-pin-input:focus { border-color: var(--s); background: #fff; }
      .ghost-status-pill {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: 700;
      }
      .ghost-status-on  { background: #e6f5ee; color: #1b6b45; border: 1px solid #3db578; }
      .ghost-status-off { background: #fdecea; color: #c0392b; border: 1px solid #c0392b; }
      .ghost-scenario-card {
        background: #fff8f0; border: 1.5px solid #f5c9a0;
        border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
      }
      .ghost-scenario-title { font-size: 12px; font-weight: 700; color: #c14b1f; margin-bottom: 4px; }
      .ghost-scenario-body { font-size: 11px; color: var(--im); line-height: 1.7; }

      /* Balance display override when ghost mode */
      /* .balance-real { normal } */
      .balance-ghost { color: var(--im) !important; }
      
      /* Safety vault nav badge */
      .ni-safety { background: rgba(192,57,43,0.18) !important; color: #c0392b !important; border-left-color: #c0392b !important; }

      /* ═══════════════════════════════════
         GLOBAL MOBILE SAFETY NET
      ═══════════════════════════════════ */
      @media (max-width: 768px) {
        /* Prevent ANY element from causing horizontal scroll */
        .content > * { max-width: 100%; }
        
        /* Flex rows that must wrap on mobile */
        .card > div[style*="display:flex"],
        .card > div[style*="display: flex"] { flex-wrap: wrap; }

        /* All inline-style grids with 3+ cols collapse to 2 on tablet, 1 on mobile */
        div[style*="gridTemplateColumns"][style*="repeat(3"],
        div[style*="gridTemplateColumns"][style*="1fr 1fr 1fr"] {
          grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)) !important;
        }
        div[style*="gridTemplateColumns"][style*="repeat(4"],
        div[style*="gridTemplateColumns"][style*="repeat(5"],
        div[style*="gridTemplateColumns"][style*="repeat(6"] {
          grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)) !important;
        }

        /* Fix wide stat rows */
        div[style*="display:flex"][style*="gap:12"],
        div[style*="display: flex"][style*="gap: 12"] { flex-wrap: wrap; }

        /* Topbar language switcher doesn't overflow */
        .lang-wrap { flex-shrink: 0; }

        /* Scheme/result cards */
        .voice-result { flex-wrap: wrap; gap: 8px; }

        /* Notif panel stays in viewport */
        .notif-panel {
          position: fixed !important;
          top: 56px !important;
          right: 8px !important;
          left: 8px !important;
          width: auto !important;
          max-width: calc(100vw - 16px) !important;
          z-index: 500 !important;
        }

        /* Mascot bubble doesn't overflow */
        .mascot-bubble {
          max-width: min(260px, 80vw) !important;
          right: 0 !important;
          left: auto !important;
        }

        /* Make IVR keypad fit */
        .ivr-keypad { max-width: 100% !important; }

        /* Dashboard story cards horizontal scroll */
        .story-row { overflow-x: auto !important; flex-wrap: nowrap !important; padding-bottom: 8px !important; }
        .story-card { flex-shrink: 0 !important; min-width: 200px !important; }

        /* Pin pad fits screen */
        .pin-pad { width: min(260px, 90vw) !important; }

        /* Schemes filter chips wrap */
        .filter-chips { flex-wrap: wrap !important; }
      }

      @media (max-width: 480px) {
        /* Stack any flex row that has 3+ items */
        div[style*="gridTemplateColumns"][style*="1fr 1fr"] {
          grid-template-columns: 1fr !important;
        }
        /* Exception: keep 2-col for very small items like stats */
        .stat-grid-2 { grid-template-columns: repeat(2,1fr) !important; }
      }

        2:{en:"1. UPI lets you send/receive money instantly using your phone number or QR code.\n2. To receive payment: show your UPI QR code or share your UPI ID like name@upi.\n3. Popular UPI apps: PhonePe, Google Pay, Paytm, BHIM \u2014 all free.\n4. NEVER share your UPI PIN with anyone \u2014 not even bank staff.\n5. Create a QR code poster and share on WhatsApp to get more orders.",hi:"1. UPI \u0938\u0947 \u092b\u094b\u0928 \u0928\u0902\u092c\u0930 \u092f\u093e QR \u0915\u094b\u0921 \u0938\u0947 \u0924\u0941\u0930\u0902\u0924 \u092a\u0948\u0938\u0947 \u092d\u0947\u091c/\u092a\u093e \u0938\u0915\u0924\u0947 \u0939\u0948\u0902\u0964\n2. \u092d\u0941\u0917\u0924\u093e\u0928 \u092a\u093e\u0928\u0947: \u0905\u092a\u0928\u093e UPI QR \u0915\u094b\u0921 \u0926\u093f\u0916\u093e\u090f\u0902\u0964\n3. \u0932\u094b\u0915\u092a\u094d\u0930\u093f\u092f \u090f\u092a: PhonePe, Google Pay, Paytm, BHIM\u0964\n4. UPI PIN \u0915\u092d\u0940 \u0915\u093f\u0938\u0940 \u0938\u0947 \u0936\u0947\u092f\u0930 \u0928 \u0915\u0930\u0947\u0902\u0964\n5. QR \u0915\u094b\u0921 \u092a\u094b\u0938\u094d\u091f\u0930 \u092c\u0928\u093e\u090f\u0902 \u0914\u0930 WhatsApp \u092a\u0930 \u0936\u0947\u092f\u0930 \u0915\u0930\u0947\u0902\u0964",te:"1. UPI \u0c26\u0c4d\u0c35\u0c3e\u0c30\u0c3e \u0c2b\u0c4b\u0c28\u0c4d \u0c28\u0c02\u0c2c\u0c30\u0c4d \u0c32\u0c47\u0c26\u0c3e QR \u0c15\u0c4b\u0c21\u0c4d \u0c09\u0c2a\u0c2f\u0c4b\u0c17\u0c3f\u0c02\u0c1a\u0c3f \u0c35\u0c46\u0c02\u0c1f\u0c28\u0c47 \u0c21\u0c2c\u0c4d\u0c2c\u0c41 \u0c2a\u0c02\u0c2a\u0c35\u0c1a\u0c4d\u0c1a\u0c41/\u0c2a\u0c4a\u0c02\u0c26\u0c35\u0c1a\u0c4d\u0c1a\u0c41.\n2. \u0c1a\u0c46\u0c32\u0c4d\u0c32\u0c3f\u0c02\u0c2a\u0c41 \u0c2a\u0c4a\u0c02\u0c26\u0c21\u0c3e\u0c28\u0c3f\u0c15\u0c3f: \u0c2e\u0c40 UPI QR \u0c15\u0c4b\u0c21\u0c4d \u0c1a\u0c42\u0c2a\u0c3f\u0c02\u0c1a\u0c02\u0c21\u0c3f.\n3. \u0c1c\u0c28\u0c2a\u0c4d\u0c30\u0c3f\u0c2f UPI \u0c2f\u0c3e\u0c2a\u0c4d\u200c\u0c32\u0c41: PhonePe, Google Pay, Paytm, BHIM.\n4. UPI PIN \u0c0e\u0c35\u0c30\u0c3f\u0c15\u0c3f\u0c1a\u0c4d\u0c1a\u0c3e \u0c1a\u0c46\u0c2a\u0c4d\u0c2a\u0c15\u0c02\u0c21\u0c3f.\n5. QR \u0c15\u0c4b\u0c21\u0c4d \u0c2a\u0c4b\u0c38\u0c4d\u0c1f\u0c30\u0c4d \u0c24\u0c2f\u0c3e\u0c30\u0c41 \u0c1a\u0c47\u0c38\u0c3f WhatsApp \u0c32\u0c4b \u0c37\u0c47\u0c30\u0c4d \u0c1a\u0c47\u0c2f\u0c02\u0c21\u0c3f."},
        6:{en:"1. Meesho and Flipkart let you sell with zero upfront cost.\n2. To list on Meesho: download app, create supplier account, add product photos and price.\n3. WhatsApp Business: create product catalogue, share with customers daily.\n4. Good photos sell more \u2014 daylight, plain white background, all angles.\n5. Collect payment before dispatching. Use UPI or COD for local sales.",hi:"1. Meesho \u0914\u0930 Flipkart \u092a\u0930 \u092c\u093f\u0928\u093e \u0905\u0917\u094d\u0930\u093f\u092e \u0932\u093e\u0917\u0924 \u0915\u0947 \u092c\u0947\u091a\u0947\u0902\u0964\n2. Meesho \u092a\u0930 \u0932\u093f\u0938\u094d\u091f \u0915\u0930\u0928\u0947: \u090f\u092a \u0921\u093e\u0909\u0928\u0932\u094b\u0921, \u0938\u092a\u094d\u0932\u093e\u092f\u0930 \u0905\u0915\u093e\u0909\u0902\u091f, \u092b\u094b\u091f\u094b + \u0915\u0940\u092e\u0924\u0964\n3. WhatsApp Business \u092a\u0930 \u092a\u094d\u0930\u094b\u0921\u0915\u094d\u091f \u0915\u0948\u091f\u0932\u0949\u0917 \u092c\u0928\u093e\u090f\u0902\u0964\n4. \u0905\u091a\u094d\u091b\u0940 \u092b\u094b\u091f\u094b = \u0905\u0927\u093f\u0915 \u092c\u093f\u0915\u094d\u0930\u0940\u0964\n5. \u0921\u093f\u0938\u094d\u092a\u0948\u091a \u0938\u0947 \u092a\u0939\u0932\u0947 \u092a\u0947\u092e\u0947\u0902\u091f \u0932\u0947\u0902\u0964",te:"1. Meesho \u0c2e\u0c30\u0c3f\u0c2f\u0c41 Flipkart \u0c32\u0c4b \u0c1c\u0c40\u0c30\u0c4b \u0c16\u0c30\u0c4d\u0c1a\u0c41\u0c24\u0c4b \u0c05\u0c2e\u0c4d\u0c2e\u0c35\u0c1a\u0c4d\u0c1a\u0c41.\n2. Meesho: \u0c2f\u0c3e\u0c2a\u0c4d \u0c21\u0c4c\u0c28\u0c4d\u200c\u0c32\u0c4b\u0c21\u0c4d, \u0c38\u0c2a\u0c4d\u0c32\u0c2f\u0c30\u0c4d \u0c05\u0c15\u0c57\u0c02\u0c1f\u0c4d, \u0c2b\u0c4b\u0c1f\u0c4b + \u0c27\u0c30.\n3. WhatsApp Business \u0c32\u0c4b \u0c2a\u0c4d\u0c30\u0c4a\u0c21\u0c15\u0c4d\u0c1f\u0c4d \u0c15\u0c47\u0c1f\u0c32\u0c3e\u0c17\u0c4d \u0c37\u0c47\u0c30\u0c4d \u0c1a\u0c47\u0c2f\u0c02\u0c21\u0c3f.\n4. \u0c2e\u0c02\u0c1a\u0c3f \u0c2b\u0c4b\u0c1f\u0c4b\u0c32\u0c41 = \u0c0e\u0c15\u0c4d\u0c15\u0c41\u0c35 \u0c05\u0c2e\u0c4d\u0c2e\u0c15\u0c3e\u0c32\u0c41.\n5. \u0c2a\u0c02\u0c2a\u0c41\u0c21\u0c15\u0c41 \u0c2e\u0c41\u0c02\u0c26\u0c41 \u0c2a\u0c47\u0c2e\u0c46\u0c02\u0c1f\u0c4d \u0c24\u0c40\u0c38\u0c41\u0c15\u0c4f\u0c02\u0c21\u0c3f."},

      function getApiKey(){return localStorage.getItem("shakti_api_key")||""}
      function setApiKey(k){localStorage.setItem("shakti_api_key",k.trim())}

      async function callAI(messages,system,maxTok){
        let key=getApiKey();
        if(!key){
          key=prompt("Enter your FREE Groq API Key to use AI features:\nGet it free at: console.groq.com (no credit card needed)");
          if(!key)throw new Error("No API key");
          setApiKey(key);
        }
        try{
          const allMsgs=system?[{role:"system",content:system},...messages]:messages;
          const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
            body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:maxTok||800,messages:allMsgs})
          });
          const d=await r.json();
          if(d.error){
            if(d.error.code==="invalid_api_key"||d.error.status===401){
              localStorage.removeItem("shakti_api_key");
              throw new Error("Invalid Groq API key. Please try again.");
            }
            throw new Error(d.error.message||"API error");
          }
          return d.choices?.[0]?.message?.content||"Unable to respond. Please try again.";
        }catch(e){throw e}
      }

      // ══════════════════════════════════════════════════
      // QR CODE GENERATOR (pure JS, no library)
      // ══════════════════════════════════════════════════
      function QRDisplay({upiId}){
        const canvasRef=useRef();
        useEffect(()=>{
          if(!canvasRef.current)return;
          const c=canvasRef.current;const ctx=c.getContext("2d");
          c.width=140;c.height=140;
          ctx.fillStyle="#fff";ctx.fillRect(0,0,140,140);
          // Draw a decorative QR-like pattern (visual placeholder)
          ctx.fillStyle="#1E2140";
          const s=5;const off=10;
          for(let y=0;y<24;y++){for(let x=0;x<24;x++){
            const rand=((x*7+y*13+x*y)%3)===0;
            const inFinder=(x<7&&y<7)||(x>16&&y<7)||(x<7&&y>16);
            if(rand||inFinder){ctx.fillRect(off+x*s,off+y*s,s-1,s-1)}
          }}
          // Finder patterns
          ctx.strokeStyle="#1E2140";ctx.lineWidth=2;
          [[off,off],[off+17*s,off],[off,off+17*s]].forEach(([fx,fy])=>{
            ctx.strokeRect(fx,fy,7*s,7*s);
            ctx.fillRect(fx+s,fy+s,5*s,5*s);
            ctx.fillStyle="#fff";ctx.fillRect(fx+2*s,fy+2*s,3*s,3*s);
            ctx.fillStyle="#1E2140";ctx.fillRect(fx+3*s,fy+3*s,s,s);
          });
          // Center logo
          ctx.fillStyle="rgba(255,255,255,0.9)";ctx.fillRect(55,55,30,30);
          ctx.fillStyle="var(--s)";ctx.font="bold 16px Poppins";ctx.fillText("₹",62,74);
        },[upiId]);
        return React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:8}},
          React.createElement("canvas",{ref:canvasRef,style:{borderRadius:8,border:"1px solid var(--border)"}}),
          React.createElement("div",{style:{fontSize:10,color:"var(--im)",fontWeight:500}},upiId||"your-biz@upi"),
          React.createElement("div",{style:{fontSize:9,color:"var(--im)"}},"Scan to pay instantly")
        );
      }

      function useOfflineMode(){
        const [isOnline,setIsOnline]=useState(navigator.onLine);
        const [pendingSync,setPendingSync]=useState([]);
        useEffect(()=>{
          const onOnline=()=>{setIsOnline(true);syncPending()};
          const onOffline=()=>setIsOnline(false);
          window.addEventListener("online",onOnline);
          window.addEventListener("offline",onOffline);
          return()=>{window.removeEventListener("online",onOnline);window.removeEventListener("offline",onOffline)};
        },[]);
        const saveOffline=(key,data)=>{
          try{localStorage.setItem("shakti_offline_"+key,JSON.stringify({data,ts:Date.now()}));setPendingSync(p=>[...p.filter(x=>x!==key),key])}catch(e){}
        };
        const loadOffline=(key)=>{try{const s=localStorage.getItem("shakti_offline_"+key);return s?JSON.parse(s).data:null}catch(e){return null}};
        const syncPending=()=>{
          setTimeout(()=>setPendingSync([]),1500);
        };
        return{isOnline,pendingSync,saveOffline,loadOffline};
      }

      const GHOST_KEY = "shakti_ghost_setup";

      function loadGhostSetup() {
        try { return JSON.parse(localStorage.getItem(GHOST_KEY)) || null; }

      // ── PIN GATE — shown after login if ghost balance is configured ──
      function PinGate({ onUnlock }) {
        const [entered, setEntered] = useState([]);
        const [shaking, setShaking] = useState(false);
        const [errMsg, setErrMsg] = useState("");
        const [pressedKey, setPressedKey] = useState(null);
        const MAX = 6;

        const setup = loadGhostSetup();
        // If no setup at all, skip gate immediately
        if (!setup || !setup.enabled) { onUnlock(false); return null; }

        const press = (d) => {
          if (entered.length >= MAX) return;
          setPressedKey(d);
          setTimeout(() => setPressedKey(null), 120);
          const next = [...entered, d];
          setEntered(next);
          setErrMsg("");

          // Check after enough digits
          if (next.length >= 4) {
            const typed = next.join("");
            setTimeout(() => {
              if (typed === setup.realPin) {
                onUnlock(false); // real mode
              } else if (typed === setup.ghostPin) {
                onUnlock(true); // ghost mode
              } else if (next.length === MAX || (next.length >= 4 && typed !== setup.realPin.substring(0,next.length) && typed !== setup.ghostPin.substring(0,next.length))) {
                // Wrong — shake and reset
                setShaking(true);
                setErrMsg("Incorrect PIN. Try again.");
                setTimeout(() => { setEntered([]); setShaking(false); }, 700);
              }
            }, 180);
          }
        };

        const del = () => { setEntered(e => e.slice(0,-1)); setErrMsg(""); };

        const PAD = [
          ["1",""],["2","ABC"],["3","DEF"],
          ["4","GHI"],["5","JKL"],["6","MNO"],
          ["7","PQRS"],["8","TUV"],["9","WXYZ"],
          ["",""],["0",""],["⌫",""]
        ];

        return React.createElement("div", { className: "pin-gate" },
          React.createElement("div", { className: "pin-gate-logo" }, "शक्ति AI"),
          React.createElement("div", { className: "pin-gate-sub" }, "ENTER YOUR PIN TO CONTINUE"),
          React.createElement("div", { className: "pin-dots" },
            Array.from({length: setup.realPin.length || 4}).map((_,i) =>
              React.createElement("div", {
                key: i,
                className: "pin-dot" + (entered.length > i ? (shaking ? " error" : " filled") : "")
              })
            )
          ),
          React.createElement("div", { className: "pin-pad" },
            PAD.map(([num, letters], i) =>
              num === "" ? React.createElement("div", { key: i }) :
              React.createElement("div", {
                key: i,
                className: "pin-key" + (num === "⌫" ? " del" : "") + (pressedKey === num ? " pressed" : ""),
                onClick: num === "⌫" ? del : () => press(num)
              },
                React.createElement("div", { className: "pin-key-num" }, num),
                letters ? React.createElement("div", { className: "pin-key-letters" }, letters) : null
              )
            )
          ),
          React.createElement("div", { className: "pin-error-msg" }, errMsg),
          React.createElement("div", { className: "pin-hint" },
            "Enter your security PIN to access your account"
          ),
          React.createElement("button", {
            className: "pin-skip-btn",
            onClick: () => onUnlock(null)
          }, "Skip (demo mode)")
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
